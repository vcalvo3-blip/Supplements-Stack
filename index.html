<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Suplementos" />
  <title>Protocolo Diario · Suplementación</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      color: #f1f5f9;
      padding-bottom: env(safe-area-inset-bottom, 24px);
      -webkit-tap-highlight-color: transparent;
    }

    /* HEADER */
    #header {
      padding: 52px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    #header .eyebrow {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    #header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* PROGRESS */
    #progress-wrap { margin-top: 16px; }
    #progress-labels {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    #progress-count { font-size: 12px; color: #94a3b8; }
    #progress-pct   { font-size: 13px; font-weight: 600; color: #94a3b8; transition: color 0.3s; }
    #progress-track {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #6366f1, #8b5cf6);
      border-radius: 99px;
      transition: width 0.4s ease, background 0.4s ease;
    }

    /* TABS */
    #tabs {
      display: flex;
      padding: 12px 16px;
      gap: 6px;
    }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 8px 4px;
      cursor: pointer;
      color: #475569;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: rgba(99,102,241,0.2);
      border-color: rgba(99,102,241,0.5);
      color: #a5b4fc;
    }
    .tab-emoji { font-size: 18px; line-height: 1; }
    .tab-label { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
    .tab-count { font-size: 10px; color: #334155; }
    .tab-btn.active .tab-count { color: #6366f1; }

    /* SUBTITLE */
    #meal-subtitle {
      padding: 0 20px 12px;
      color: #475569;
      font-size: 12px;
    }

    /* CARDS */
    #cards {
      padding: 0 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .supp-btn {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      text-align: left;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .supp-btn.done {
      background: rgba(16,185,129,0.08);
      border-color: rgba(16,185,129,0.3);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .supp-name {
      font-size: 14px;
      font-weight: 600;
      color: #e2e8f0;
      transition: all 0.2s;
    }
    .supp-btn.done .supp-name {
      color: #6ee7b7;
      text-decoration: line-through;
    }
    .supp-detail {
      font-size: 12px;
      color: #475569;
      margin-top: 2px;
      transition: color 0.2s;
    }
    .supp-btn.done .supp-detail { color: rgba(74,222,128,0.4); }
    .check-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #334155;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
    }
    .supp-btn.done .check-circle {
      border-color: #10b981;
      background: #10b981;
    }

    /* RESET */
    #reset-wrap { padding: 24px 16px 0; text-align: center; }
    #reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 10px 28px;
      color: #475569;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    #reset-btn:active { background: rgba(255,255,255,0.05); }

    /* FOOTER NOTE */
    #note {
      padding: 16px 20px 0;
      font-size: 11px;
      color: #334155;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

<div id="header">
  <div class="eyebrow">Stack de Suplementación</div>
  <h1>Protocolo Diario</h1>
  <div id="progress-wrap">
    <div id="progress-labels">
      <span id="progress-count" class="progress-count">0 de 15 suplementos</span>
      <span id="progress-pct">0%</span>
    </div>
    <div id="progress-track">
      <div id="progress-bar"></div>
    </div>
  </div>
</div>

<div id="tabs"></div>
<div id="meal-subtitle"></div>
<div id="cards"></div>

<div id="reset-wrap">
  <button id="reset-btn" onclick="resetAll()">Reiniciar día</button>
</div>
<div id="note">
  La creatina puede tomarse en cualquier momento · Agitar Wonder-C antes de usar
</div>

<script>
const supplements = {
  ayunas: [
    { id: "niagen",   name: "Tru Niagen NR",        dose: "600mg · 2 cáps.",      detail: "NAD+ mitocondrial",              color: "#f59e0b" },
    { id: "nac",      name: "NAC 600mg",             dose: "600mg · 1 cáps.",      detail: "Raibu · precursor glutatión",    color: "#10b981" },
  ],
  desayuno: [
    { id: "sag",      name: "S-Acetyl Glutatión",    dose: "200–300mg · 2-3 cáps.", detail: "California Gold Nutrition",     color: "#10b981" },
    { id: "wonderc",  name: "Wonder-C Liposomal",    dose: "15ml · 1 cucharada",   detail: "Codeage · Vit C + D3 + Zinc",   color: "#f97316" },
    { id: "k2",       name: "K2 MK-7",               dose: "200mcg · 1 comp.",     detail: "Nutravita · con grasa",          color: "#8b5cf6" },
    { id: "astax",    name: "Astaxantina 8mg",        dose: "8mg · 1 cáps.",        detail: "Aldous · con grasa",             color: "#ef4444" },
    { id: "maca",     name: "Bio Maca",               dose: "4 past.",              detail: "Aldous · adaptógeno",            color: "#84cc16" },
    { id: "creatina", name: "Creatina Creapure®",     dose: "5g · polvo",           detail: "HSN · cualquier momento",        color: "#3b82f6" },
    { id: "omega3",   name: "Omega-3 Triple",         dose: "2 cáps.",              detail: "Viva Naturals · IFOS · con grasa", color: "#06b6d4" },
  ],
  comida: [
    { id: "rala",      name: "R-ALA R-Type",          dose: "1 cáps.",              detail: "Kobho · reciclador glutatión",   color: "#f59e0b" },
    { id: "spirulina", name: "Spirulina + Chlorella",  dose: "3 past.",             detail: "Dosis diaria completa",          color: "#22c55e" },
  ],
  noche: [
    { id: "mag",      name: "Magnesio Bisglicinato",  dose: "400mg · 4 cáps.",      detail: "California Gold TRAACS® · pre-sueño", color: "#6366f1" },
  ],
};

const mealConfig = {
  ayunas:   { label: "Ayunas",   emoji: "🌅", subtitle: "Antes del desayuno" },
  desayuno: { label: "Desayuno", emoji: "🍳", subtitle: "Con el desayuno"    },
  comida:   { label: "Comida",   emoji: "🥗", subtitle: "Con la comida"      },
  noche:    { label: "Noche",    emoji: "🌙", subtitle: "Pre-sueño"           },
};

function getActiveMeal() {
  const h = new Date().getHours();
  if (h >= 6  && h < 8)  return "ayunas";
  if (h >= 8  && h < 13) return "desayuno";
  if (h >= 13 && h < 21) return "comida";
  return "noche";
}

let activeTab = getActiveMeal();
let checked = {};

const STORAGE_KEY = "supp_checked_v2";
const DATE_KEY    = "supp_date_v2";

function loadState() {
  const today = new Date().toDateString();
  const savedDate = localStorage.getItem(DATE_KEY);
  if (savedDate === today) {
    try { checked = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch(e) { checked = {}; }
  } else {
    checked = {};
    localStorage.setItem(DATE_KEY, today);
    localStorage.setItem(STORAGE_KEY, "{}");
  }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
  localStorage.setItem(DATE_KEY, new Date().toDateString());
}

function allSupps() {
  return Object.values(supplements).flat();
}

function updateProgress() {
  const total = allSupps().length;
  const done  = allSupps().filter(s => checked[s.id]).length;
  const pct   = Math.round((done / total) * 100);

  document.getElementById("progress-count").textContent = `${done} de ${total} suplementos`;
  const pctEl = document.getElementById("progress-pct");
  pctEl.textContent = pct === 100 ? "✓ Completado" : `${pct}%`;
  pctEl.style.color = pct === 100 ? "#4ade80" : "#94a3b8";

  const bar = document.getElementById("progress-bar");
  bar.style.width = pct + "%";
  bar.style.background = pct === 100
    ? "linear-gradient(90deg, #4ade80, #22d3ee)"
    : "linear-gradient(90deg, #6366f1, #8b5cf6)";
}

function renderTabs() {
  const container = document.getElementById("tabs");
  container.innerHTML = "";
  Object.entries(mealConfig).forEach(([key, m]) => {
    const list   = supplements[key] || [];
    const done   = list.filter(s => checked[s.id]).length;
    const allDone = done === list.length && list.length > 0;
    const isActive = key === activeTab;

    const btn = document.createElement("button");
    btn.className = "tab-btn" + (isActive ? " active" : "");
    btn.innerHTML = `
      <span class="tab-emoji">${allDone ? "✅" : m.emoji}</span>
      <span class="tab-label">${m.label}</span>
      <span class="tab-count">${done}/${list.length}</span>
    `;
    btn.addEventListener("click", () => {
      activeTab = key;
      renderTabs();
      renderCards();
      document.getElementById("meal-subtitle").textContent = mealConfig[key].subtitle;
    });
    container.appendChild(btn);
  });
}

function renderCards() {
  const list = supplements[activeTab] || [];
  const container = document.getElementById("cards");
  container.innerHTML = "";

  list.forEach(s => {
    const isDone = !!checked[s.id];
    const btn = document.createElement("button");
    btn.className = "supp-btn" + (isDone ? " done" : "");
    btn.innerHTML = `
      <div class="dot" style="background:${isDone ? "#10b981" : s.color};box-shadow:0 0 6px ${isDone ? "rgba(16,185,129,0.5)" : s.color + "60"}"></div>
      <div style="flex:1">
        <div class="supp-name">${s.name}</div>
        <div class="supp-detail">${s.dose} · ${s.detail}</div>
      </div>
      <div class="check-circle">${isDone ? "✓" : ""}</div>
    `;
    btn.addEventListener("click", () => {
      checked[s.id] = !checked[s.id];
      saveState();
      renderTabs();
      renderCards();
      updateProgress();
    });
    container.appendChild(btn);
  });
}

function resetAll() {
  checked = {};
  saveState();
  renderTabs();
  renderCards();
  updateProgress();
}

// Init
loadState();
document.getElementById("meal-subtitle").textContent = mealConfig[activeTab].subtitle;
renderTabs();
renderCards();
updateProgress();
</script>
</body>
</html>
